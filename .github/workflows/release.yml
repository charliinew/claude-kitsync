name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Create release tarball
        run: |
          tar -czf claude-kitsync-${{ github.ref_name }}.tar.gz \
            bin/ lib/ kit/ templates/ VERSION README.md install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: claude-kitsync-${{ github.ref_name }}.tar.gz
