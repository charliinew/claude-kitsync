name: Homebrew Bump

on:
  release:
    types: [published]

jobs:
  bump:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest

    steps:
      - uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: charliinew/homebrew-claude-kitsync
          formula: claude-kitsync
